<!DOCTYPE html>
<html lang="ru" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAGDECOR & METALLHAUT</title>
  
  <!-- Загрузчик Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (typeof tailwind !== 'undefined') {
      tailwind.config = { 
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            colors: {
              slate: { 850: '#151f32' }
            }
          }
        }
      };
    }
  </script>

  <!-- React и Babel (Максимально стабильные ссылки CDNJS без crossorigin) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background-color: #f1f5f9; color: #0f172a; }
    
    /* Красивый скроллбар */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    
    /* Фикс для Masonry-сетки (чтобы карточки не разрывались) */
    .masonry-col { break-inside: avoid; margin-bottom: 1.5rem; }

    /* === НОВЫЕ АНИМАЦИИ И ЭФФЕКТЫ === */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .task-enter {
      animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .is-dragging {
      opacity: 0.4 !important;
      transform: scale(0.95) rotate(-2deg);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    #fallback-error { display: none; background: #fee2e2; color: #991b1b; padding: 20px; text-align: center; font-weight: bold; border-bottom: 4px solid #ef4444; }
  </style>
</head>
<body class="transition-colors duration-300 dark:bg-slate-900">

  <div id="fallback-error"></div>

  <script>
    // Проверка, что скрипты не заблокировались браузером/антивирусом
    setTimeout(function() { 
      var errBox = document.getElementById('fallback-error');
      if (typeof tailwind === 'undefined') {
        errBox.innerHTML = '🚨 ВНИМАНИЕ! Браузер заблокировал стили (Tailwind). Отключите блокировщики (AdBlock) для этого сайта.';
        errBox.style.display = 'block';
      } else if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
        errBox.innerHTML = '🚨 ВНИМАНИЕ! Библиотека React не загрузилась! Отключите блокировщики скриптов или проверьте интернет.';
        errBox.style.display = 'block';
      }
    }, 1500);
  </script>
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, memo, useRef, useMemo } = React;

    // === БЕЗОПАСНОЕ СОХРАНЕНИЕ ===
    const safeStorageSet = (key, value) => {
      try { localStorage.setItem(key, value); } catch (e) { console.warn('Storage disabled'); }
    };

    // === ВЕКТОРНЫЕ ИКОНКИ (SVG) ===
    const Icons = {
      Check: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
      Square: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>,
      Trash: () => <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
      Edit: () => <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
      User: () => <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
      Palette: () => <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>,
      Plus: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
      Grip: () => <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>,
      Search: () => <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
      Download: () => <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
      Upload: () => <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
      Filter: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>,
      Sun: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>,
      Moon: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>,
      Layout: () => <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>,
      Columns: () => <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="3" x2="12" y2="21"></line></svg>,
      Bolt: () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
      Folder: () => <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
    };

    // === ДАННЫЕ ===
    const TEAM = [
      { id: 'u1', name: 'Иван', initials: 'ИВ', color: 'bg-blue-500' },
      { id: 'u2', name: 'Наталья', initials: 'НТ', color: 'bg-purple-500' },
      { id: 'u3', name: 'Никита', initials: 'НК', color: 'bg-emerald-500' },
      { id: 'u4', name: 'Дизайнер', initials: 'ДЗ', color: 'bg-rose-500' },
    ];

    const initialData = [
      { id: 1, title: 'Документы и продажи', items: [
          { id: '1-1', text: 'Делать Кп', checked: false, status: 'todo' },
          { id: '1-2', text: 'Выставлять счета', checked: false, status: 'todo' },
          { id: '1-3', text: 'УПД', checked: false, status: 'todo' },
          { id: '1-4', text: 'Заявка на отгрузку', checked: false, status: 'todo' },
          { id: '1-5', text: 'КП+Каталог', checked: false, status: 'todo' },
      ]},
      { id: 2, title: 'Связь', items: [
          { id: '2-1', text: 'Телефон', checked: false, status: 'todo' },
          { id: '2-2', text: 'Переадресация', checked: false, status: 'todo' },
          { id: '2-3', text: 'Почта+сбор', checked: false, status: 'todo' },
      ]},
      { id: 3, title: 'Соцсети', items: [
          { id: '3-1', text: 'Вк', checked: false, status: 'todo' },
          { id: '3-2', text: 'Инста', checked: false, status: 'todo' },
          { id: '3-3', text: 'Тг', checked: false, status: 'todo' },
          { id: '3-4', text: 'Дзен', checked: false, status: 'todo' },
          { id: '3-5', text: 'Тредсы', checked: false, status: 'todo' },
      ]},
      { id: 4, title: 'Проекты', items: [
          { id: '4-1', text: 'Маглинк', checked: false, status: 'todo' },
          { id: '4-2', text: 'Металлхаут', checked: false, status: 'todo' },
      ]},
      { id: 5, title: 'Люди и встречи', items: [
          { id: '5-1', text: 'Наталья', checked: false, status: 'todo' },
          { id: '5-2', text: 'История', checked: false, status: 'todo' },
          { id: '5-3', text: 'Никита', checked: false, status: 'todo' },
          { id: '5-4', text: 'Кофемания', checked: false, status: 'todo' },
      ]},
      { id: 6, title: 'Партнеры', items: [
          { id: '6-1', text: 'Дилеры', checked: false, status: 'todo' },
          { id: '6-2', text: 'Обучение', checked: false, status: 'todo' },
          { id: '6-3', text: 'КП', checked: false, status: 'todo' },
          { id: '6-4', text: 'Звонки', checked: false, status: 'todo' },
      ]},
      { id: 7, title: 'Производство', items: [
          { id: '7-1', text: 'Этикетки', checked: false, status: 'todo' },
          { id: '7-2', text: 'Банки', checked: false, status: 'todo' },
          { id: '7-3', text: 'Сертификаты', checked: false, status: 'todo' },
      ]},
      { id: 8, title: 'Объекты', items: [
          { id: '8-1', text: 'Кухни', checked: false, status: 'todo' },
          { id: '8-2', text: 'Скульптуры', checked: false, status: 'todo' },
          { id: '8-3', text: 'Столы', checked: false, status: 'todo' },
          { id: '8-4', text: 'Стены', checked: false, status: 'todo' },
          { id: '8-5', text: 'Шкафы', checked: false, status: 'todo' },
      ]}
    ];

    const colorStyles = {
      default: 'bg-white text-slate-700 border-slate-200 hover:border-slate-300 dark:bg-slate-800 dark:text-slate-200 dark:border-slate-700 dark:hover:border-slate-600',
      red: 'bg-red-50 text-red-800 border-red-200 dark:bg-red-900/30 dark:text-red-300 dark:border-red-800/50',
      yellow: 'bg-yellow-50 text-yellow-800 border-yellow-200 dark:bg-yellow-900/30 dark:text-yellow-300 dark:border-yellow-800/50',
      green: 'bg-emerald-50 text-emerald-800 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-300 dark:border-emerald-800/50',
    };

    // === КОНФЕТТИ ===
    const Confetti = memo(() => {
      const pieces = Array.from({ length: 100 });
      const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6'];
      return (
        <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
          {pieces.map((_, i) => (
            <div key={i} className="confetti-piece" style={{
              left: `${Math.random() * 100}%`,
              backgroundColor: colors[Math.floor(Math.random() * colors.length)],
              animationDelay: `${Math.random() * 1.5}s`,
              animationDuration: `${2 + Math.random() * 2}s`,
              width: `${6 + Math.random() * 6}px`, height: `${10 + Math.random() * 10}px`,
            }} />
          ))}
        </div>
      );
    });

    // === ЗАДАЧА В СЕТКЕ ===
    const GridTaskItem = memo(({ item, sectionId, onToggle, onDelete, onEdit, onColorCycle, onAssignCycle, onDropItem }) => {
      const [isEditing, setIsEditing] = useState(false);
      const [editValue, setEditValue] = useState(item.text);
      const [isDragging, setIsDragging] = useState(false);
      const assigneeData = TEAM.find(t => t.id === item.assignee);

      useEffect(() => setEditValue(item.text), [item.text]);

      const saveEdit = () => {
        if (editValue.trim() && editValue !== item.text) onEdit(sectionId, item.id, editValue.trim());
        setIsEditing(false);
      };

      const handleDragStart = (e) => {
        e.dataTransfer.setData('application/json', JSON.stringify({ srcSecId: sectionId, srcItemId: item.id }));
        setTimeout(() => setIsDragging(true), 0);
      };
      
      const handleDragEnd = () => setIsDragging(false);

      return (
        <li 
          draggable 
          onDragStart={handleDragStart}
          onDragEnd={handleDragEnd}
          onDragOver={(e) => e.preventDefault()}
          onDrop={(e) => onDropItem(e, item.id)}
          className={`task-enter flex items-start gap-2.5 group p-2.5 rounded-xl border transition-all duration-200 shadow-sm hover:shadow-md relative ${colorStyles[item.color || 'default']} ${isDragging ? 'is-dragging' : ''}`}
        >
          {/* Иконка перетаскивания */}
          <div className="mt-[2px] opacity-0 group-hover:opacity-100 cursor-grab active:cursor-grabbing text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-opacity">
            <Icons.Grip />
          </div>

          {/* Чекбокс */}
          <button onClick={() => onToggle(sectionId, item.id)} className={`mt-[2px] flex-shrink-0 transition-all duration-200 ${item.checked ? 'text-blue-500 scale-110' : 'text-slate-300 hover:text-slate-400 dark:text-slate-500 dark:hover:text-slate-400'}`}>
            {item.checked ? <Icons.Check /> : <Icons.Square />}
          </button>
          
          {/* Текст / Инпут */}
          <div className="flex-1 overflow-hidden flex flex-col justify-start">
            {isEditing ? (
              <input 
                autoFocus type="text" value={editValue} onChange={(e) => setEditValue(e.target.value)}
                onBlur={saveEdit} onKeyDown={(e) => e.key === 'Enter' && saveEdit()} 
                className="w-full bg-white dark:bg-slate-900 rounded-md text-sm px-1 py-0 -mx-1 outline-none ring-2 ring-blue-500 text-slate-800 dark:text-slate-100 font-medium shadow-sm"
              />
            ) : (
              <span onDoubleClick={() => setIsEditing(true)} className={`block w-full text-sm cursor-text transition-all duration-300 leading-tight py-[1px] ${item.checked ? 'text-slate-400 dark:text-slate-500 line-through' : 'font-medium'}`} style={{ wordBreak: 'break-word' }}>
                {item.text}
              </span>
            )}
          </div>

          {/* Аватарка */}
          {assigneeData && (
            <div className={`flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-[10px] text-white font-bold shadow-sm ${assigneeData.color}`} title={assigneeData.name}>
              {assigneeData.initials}
            </div>
          )}

          {/* Кнопки действий */}
          <div className="flex items-center absolute right-2 top-1/2 -translate-y-1/2 translate-x-2 scale-95 pointer-events-none group-hover:translate-x-0 group-hover:scale-100 group-hover:pointer-events-auto bg-white/80 dark:bg-slate-800/80 backdrop-blur-md rounded-xl shadow-lg opacity-0 group-hover:opacity-100 transition-all duration-300 p-1.5 gap-1 border border-slate-200/50 dark:border-slate-700">
            <button onClick={() => onAssignCycle(sectionId, item.id)} className="p-1 text-slate-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-slate-700 rounded-lg transition-colors" title="Назначить"><Icons.User /></button>
            <button onClick={() => onColorCycle(sectionId, item.id)} className="p-1 text-slate-400 hover:text-yellow-500 hover:bg-yellow-50 dark:hover:bg-slate-700 rounded-lg transition-colors" title="Приоритет"><Icons.Palette /></button>
            <button onClick={() => setIsEditing(true)} className="p-1 text-slate-400 hover:text-green-500 hover:bg-green-50 dark:hover:bg-slate-700 rounded-lg transition-colors" title="Редактировать"><Icons.Edit /></button>
            <button onClick={() => onDelete(sectionId, item.id)} className="p-1 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-slate-700 rounded-lg transition-colors" title="Удалить"><Icons.Trash /></button>
          </div>
        </li>
      );
    });

    // === КАРТОЧКА СЕКЦИИ ===
    const SectionCard = memo(({ section, hideCompleted, searchQuery, onToggle, onDelete, onAdd, onEdit, onColorCycle, onAssignCycle, onMove }) => {
      const [inputValue, setInputValue] = useState('');
      const [isDragOver, setIsDragOver] = useState(false);

      const visibleItems = useMemo(() => {
        return section.items
          .filter(i => hideCompleted ? !i.checked : true)
          .filter(i => searchQuery ? i.text.toLowerCase().includes(searchQuery.toLowerCase()) : true)
          .sort((a, b) => (a.checked === b.checked ? 0 : a.checked ? 1 : -1));
      }, [section.items, hideCompleted, searchQuery]);

      const handleAdd = () => { if (!inputValue.trim()) return; onAdd(section.id, inputValue.trim()); setInputValue(''); };

      const handleDropOnSection = useCallback((e) => {
        e.preventDefault(); setIsDragOver(false);
        try { const data = JSON.parse(e.dataTransfer.getData('application/json')); onMove(data.srcSecId, data.srcItemId, section.id, null); } catch(err) {}
      }, [onMove, section.id]);

      const handleDropOnItem = useCallback((e, targetItemId) => {
        e.preventDefault(); e.stopPropagation(); setIsDragOver(false);
        try { const data = JSON.parse(e.dataTransfer.getData('application/json')); onMove(data.srcSecId, data.srcItemId, section.id, targetItemId); } catch(err) {}
      }, [onMove, section.id]);

      return (
        <div 
          className={`masonry-col bg-white dark:bg-slate-850 rounded-2xl shadow-sm border overflow-hidden flex flex-col transition-all duration-300 ${isDragOver ? 'border-blue-500 shadow-xl ring-4 ring-blue-500/20 scale-[1.01]' : 'border-slate-200 dark:border-slate-700/80 hover:shadow-md'}`}
          onDragOver={(e) => { e.preventDefault(); setIsDragOver(true); }}
          onDragLeave={() => setIsDragOver(false)}
          onDrop={handleDropOnSection}
        >
          {/* Шапка карточки */}
          <div className="bg-slate-50/80 dark:bg-slate-800/50 px-4 py-3.5 border-b border-slate-200 dark:border-slate-700/80 flex justify-between items-center">
            <h2 className="font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2 tracking-tight">
              <span className="text-blue-500"><Icons.Folder /></span>
              {section.title}
            </h2>
            <span className="text-xs font-bold px-2 py-1 bg-slate-200/80 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-lg">
              {section.items.filter(i => i.checked).length} / {section.items.length}
            </span>
          </div>

          {/* Список задач */}
          <div className="p-3 flex-1 flex flex-col gap-2">
            {visibleItems.length === 0 ? (
              <div className="text-sm text-slate-400 dark:text-slate-500 text-center py-6 border-2 border-dashed border-slate-100 dark:border-slate-800 rounded-xl">
                Пусто
              </div>
            ) : (
              <ul className="space-y-2">
                {visibleItems.map(item => (
                  <GridTaskItem key={item.id} item={item} sectionId={section.id} onToggle={onToggle} onDelete={onDelete} onEdit={onEdit} onColorCycle={onColorCycle} onAssignCycle={onAssignCycle} onDropItem={handleDropOnItem} />
                ))}
              </ul>
            )}
          </div>

          {/* Добавление */}
          <div className="p-3 border-t border-slate-100 dark:border-slate-700/50 bg-slate-50/30 dark:bg-transparent">
            <div className="flex items-center gap-2">
              <input 
                type="text" placeholder="Новая задача..." value={inputValue} onChange={(e) => setInputValue(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAdd()} 
                className="flex-1 text-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 dark:text-white transition-all shadow-sm placeholder:text-slate-400" 
              />
              <button onClick={handleAdd} className="p-2.5 bg-blue-600 text-white hover:bg-blue-700 rounded-xl transition-colors shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 dark:focus:ring-offset-slate-900">
                <Icons.Plus />
              </button>
            </div>
          </div>
        </div>
      );
    });

    // === КАНБАН ЗАДАЧА ===
    const KanbanTaskItem = memo(({ item, onToggle, onAssignCycle, onColorCycle }) => {
      const [isDragging, setIsDragging] = useState(false);
      const assigneeData = TEAM.find(t => t.id === item.assignee);

      const handleDragStart = (e) => {
        e.dataTransfer.setData('application/json', JSON.stringify({ srcSecId: item.secId, srcItemId: item.id }));
        setTimeout(() => setIsDragging(true), 0);
      };
      
      const handleDragEnd = () => setIsDragging(false);

      return (
        <div 
          draggable 
          onDragStart={handleDragStart}
          onDragEnd={handleDragEnd}
          className={`task-enter p-3.5 rounded-xl shadow-sm border cursor-grab active:cursor-grabbing hover:shadow-md transition-all duration-200 group ${colorStyles[item.color || 'default']} ${isDragging ? 'is-dragging' : ''}`}
        >
          <div className="flex justify-between items-start mb-3">
            <span className="text-[10px] font-bold uppercase text-slate-500 bg-black/5 dark:bg-white/10 px-2 py-0.5 rounded-md line-clamp-1">{item.secTitle}</span>
            <div className="flex gap-1 translate-x-2 scale-95 pointer-events-none group-hover:translate-x-0 group-hover:scale-100 group-hover:pointer-events-auto opacity-0 group-hover:opacity-100 transition-all duration-300 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md rounded-lg shadow-sm border border-slate-100 dark:border-slate-700 p-0.5">
              <button onClick={() => onColorCycle(item.secId, item.id)} className="text-slate-400 hover:text-yellow-500 hover:bg-yellow-50 dark:hover:bg-slate-700 rounded-md p-1.5 transition-all"><Icons.Palette /></button>
              <button onClick={() => onAssignCycle(item.secId, item.id)} className="text-slate-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-slate-700 rounded-md p-1.5 transition-all"><Icons.User /></button>
            </div>
          </div>
          <div className="flex gap-2.5 items-start">
            <button onClick={() => onToggle(item.secId, item.id)} className={`mt-[2px] transition-all duration-200 ${item.checked ? 'text-blue-500 scale-110' : 'text-slate-300 hover:text-slate-400'}`}>
              {item.checked ? <Icons.Check /> : <Icons.Square />}
            </button>
            <span className={`text-sm leading-tight py-[1px] font-medium transition-colors ${item.checked ? 'text-slate-400 line-through' : 'text-slate-800 dark:text-slate-100'}`}>{item.text}</span>
          </div>
          {assigneeData && <div className="mt-4 flex justify-end"><div className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] text-white font-bold shadow-sm ${assigneeData.color}`} title={assigneeData.name}>{assigneeData.initials}</div></div>}
        </div>
      );
    });

    // === КАНБАН КОЛОНКА ===
    const KanbanColumn = memo(({ status, title, items, onStatusChange, onToggle, onAssignCycle, onColorCycle }) => {
      const [isDragOver, setIsDragOver] = useState(false);
      const handleDrop = useCallback((e) => {
        e.preventDefault(); setIsDragOver(false);
        try { const data = JSON.parse(e.dataTransfer.getData('application/json')); onStatusChange(data.srcSecId, data.srcItemId, status); } catch(err) {}
      }, [onStatusChange, status]);
      return (
        <div className={`flex flex-col bg-slate-200/50 dark:bg-slate-850 rounded-2xl p-4 border-2 transition-all duration-300 min-h-[60vh] ${isDragOver ? 'border-blue-500 bg-blue-50/80 dark:bg-blue-900/30 shadow-xl scale-[1.01]' : 'border-transparent'}`} onDragOver={(e) => { e.preventDefault(); setIsDragOver(true); }} onDragLeave={() => setIsDragOver(false)} onDrop={handleDrop}>
          <div className="flex justify-between items-center mb-5 px-1">
            <h3 className="font-bold text-slate-800 dark:text-slate-200 tracking-tight">{title}</h3>
            <span className="text-xs font-bold bg-white dark:bg-slate-700 px-2 py-1 rounded-lg text-slate-600 dark:text-slate-300 shadow-sm">{items.length}</span>
          </div>
          <div className="flex flex-col gap-3 flex-1">
            {items.map(item => <KanbanTaskItem key={`${item.secId}-${item.id}`} item={item} onToggle={onToggle} onAssignCycle={onAssignCycle} onColorCycle={onColorCycle} />)}
          </div>
        </div>
      );
    });

    // === ГЛАВНОЕ ПРИЛОЖЕНИЕ ===
    const App = () => {
      const [sections, setSections] = useState(initialData);
      const [isDark, setIsDark] = useState(false);
      const [hideCompleted, setHideCompleted] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [viewMode, setViewMode] = useState('grid');
      const [showConfetti, setShowConfetti] = useState(false);

      const prevCompletedSections = useRef([]);
      const prevProgress = useRef(0);
      const fileInputRef = useRef(null);

      useEffect(() => {
        try {
          if (localStorage.getItem('dashThemeDark') === 'true') { setIsDark(true); document.documentElement.classList.add('dark'); }
          if (localStorage.getItem('dashViewMode')) setViewMode(localStorage.getItem('dashViewMode'));
          const savedData = localStorage.getItem('myDashboardData');
          if (savedData) setSections(JSON.parse(savedData));
        } catch (e) {}
      }, []);

      const updateState = useCallback((updater) => {
        setSections(prev => {
          const newSections = typeof updater === 'function' ? updater(prev) : updater;
          safeStorageSet('myDashboardData', JSON.stringify(newSections));
          return newSections;
        });
      }, []);

      const toggleTheme = () => {
        setIsDark(!isDark); safeStorageSet('dashThemeDark', (!isDark).toString());
        if (!isDark) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark');
      };

      const progressStats = useMemo(() => {
        let total = 0; let completed = 0;
        sections.forEach(s => { total += s.items.length; completed += s.items.filter(i => i.checked).length; });
        const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
        return { total, completed, percent };
      }, [sections]);

      const kanbanData = useMemo(() => {
        const items = sections.flatMap(sec => sec.items.map(item => ({ ...item, secId: sec.id, secTitle: sec.title, status: item.status || (item.checked ? 'done' : 'todo') }))).filter(i => searchQuery ? i.text.toLowerCase().includes(searchQuery.toLowerCase()) : true).filter(i => hideCompleted ? !i.checked : true);
        return { todo: items.filter(i => i.status === 'todo'), inProgress: items.filter(i => i.status === 'in-progress'), done: items.filter(i => i.status === 'done') };
      }, [sections, searchQuery, hideCompleted]);

      const triggerConfetti = useCallback(() => { setShowConfetti(true); setTimeout(() => setShowConfetti(false), 4000); }, []);

      useEffect(() => {
        if (progressStats.percent === 100 && prevProgress.current < 100 && progressStats.total > 0) triggerConfetti();
        prevProgress.current = progressStats.percent;
        const completedSectionIds = sections.filter(s => s.items.length > 0 && s.items.every(i => i.checked)).map(s => s.id);
        const newCompletions = completedSectionIds.filter(id => !prevCompletedSections.current.includes(id));
        if (newCompletions.length > 0 && progressStats.percent < 100) triggerConfetti();
        prevCompletedSections.current = completedSectionIds;
      }, [sections, progressStats.percent, progressStats.total, triggerConfetti]);

      const toggleItem = useCallback((secId, itemId) => updateState(prev => prev.map(sec => sec.id === secId ? { ...sec, items: sec.items.map(i => i.id === itemId ? { ...i, checked: !i.checked, status: !i.checked ? 'done' : 'todo' } : i) } : sec)), [updateState]);
      const changeStatus = useCallback((secId, itemId, newStatus) => updateState(prev => prev.map(sec => sec.id === secId ? { ...sec, items: sec.items.map(i => i.id === itemId ? { ...i, status: newStatus, checked: newStatus === 'done' } : i) } : sec)), [updateState]);
      const deleteItem = useCallback((secId, itemId) => updateState(prev => prev.map(sec => sec.id === secId ? { ...sec, items: sec.items.filter(i => i.id !== itemId) } : sec)), [updateState]);
      const addItem = useCallback((secId, text) => updateState(prev => prev.map(sec => sec.id === secId ? { ...sec, items: [...sec.items, { id: Date.now().toString(), text, checked: false, status: 'todo', color: 'default', assignee: null }] } : sec)), [updateState]);
      const editItem = useCallback((secId, itemId, newText) => updateState(prev => prev.map(sec => sec.id === secId ? { ...sec, items: sec.items.map(i => i.id === itemId ? {...i, text: newText} : i) } : sec)), [updateState]);
      const cycleItemColor = useCallback((secId, itemId) => updateState(prev => prev.map(sec => sec.id === secId ? { ...sec, items: sec.items.map(i => { if (i.id !== itemId) return i; const cycle = ['default', 'red', 'yellow', 'green']; return {...i, color: cycle[(cycle.indexOf(i.color || 'default') + 1) % cycle.length]}; }) } : sec)), [updateState]);
      const cycleAssignee = useCallback((secId, itemId) => updateState(prev => prev.map(sec => sec.id === secId ? { ...sec, items: sec.items.map(i => { if (i.id !== itemId) return i; const currentIdx = TEAM.findIndex(t => t.id === i.assignee); const nextId = currentIdx === -1 ? TEAM[0].id : (currentIdx + 1 >= TEAM.length ? null : TEAM[currentIdx + 1].id); return {...i, assignee: nextId}; }) } : sec)), [updateState]);
      
      const moveItem = useCallback((srcSecId, srcItemId, tgtSecId, tgtItemId) => {
        updateState(prev => {
          const newSecs = JSON.parse(JSON.stringify(prev)); 
          const sSec = newSecs.find(s => s.id === srcSecId);
          const tSec = newSecs.find(s => s.id === tgtSecId);
          const srcIdx = sSec.items.findIndex(i => i.id === srcItemId);
          if (srcIdx === -1) return prev;
          const [item] = sSec.items.splice(srcIdx, 1);
          if (tgtItemId) {
            const tgtIdx = tSec.items.findIndex(i => i.id === tgtItemId);
            if (tgtIdx !== -1) tSec.items.splice(tgtIdx, 0, item); else tSec.items.push(item);
          } else { tSec.items.push(item); }
          return newSecs;
        });
      }, [updateState]);

      const exportToFile = () => {
        const blob = new Blob([JSON.stringify(sections, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a'); link.href = url; link.download = `magdecor_backup_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      const importFromFile = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => { 
          try { 
            const data = JSON.parse(evt.target.result); 
            if (Array.isArray(data)) updateState(data); 
            else alert("Неверный формат бэкапа."); 
          } catch (err) { 
            alert("Ошибка чтения файла."); 
          } 
        };
        reader.readAsText(file); e.target.value = null;
      };

      return (
        <div className="min-h-screen p-4 sm:p-6 md:p-8 text-slate-800 dark:text-slate-200 bg-[#f1f5f9] dark:bg-slate-900 transition-colors duration-300">
          {showConfetti && <Confetti />}
          <div className="max-w-[1400px] mx-auto flex flex-col h-full">
            
            {/* ШАПКА */}
            <header className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-5 flex-shrink-0 bg-white/80 dark:bg-slate-850/80 backdrop-blur-xl p-5 rounded-3xl shadow-sm border border-white/40 dark:border-slate-700/50">
              <div className="flex items-center gap-4">
                <div className="bg-gradient-to-br from-blue-500 to-indigo-600 p-3.5 text-white rounded-2xl shadow-lg shadow-blue-500/20 flex items-center justify-center">
                  <Icons.Bolt />
                </div>
                <div>
                  <h1 className="text-2xl sm:text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight leading-none">MAGDECOR & METALLHAUT</h1>
                  <p className="text-sm font-semibold text-slate-400 dark:text-slate-500 mt-1 uppercase tracking-widest">Панель Управления</p>
                </div>
              </div>
              
              <div className="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                {/* Поиск */}
                <div className="relative flex-1 lg:flex-none min-w-[200px]">
                  <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></span>
                  <input type="text" placeholder="Поиск задач..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2.5 bg-slate-100/50 dark:bg-slate-900 border border-slate-200/80 dark:border-slate-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 font-medium transition-all dark:text-white placeholder:text-slate-400" />
                </div>

                {/* Бэкап */}
                <div className="flex bg-slate-100/80 dark:bg-slate-900 p-1 rounded-xl border border-slate-200/80 dark:border-slate-700">
                  <button onClick={exportToFile} className="p-2 rounded-lg text-slate-500 hover:text-slate-900 hover:bg-white dark:hover:bg-slate-800 dark:hover:text-white transition-all" title="Скачать бэкап"><Icons.Download /></button>
                  <button onClick={() => fileInputRef.current?.click()} className="p-2 rounded-lg text-slate-500 hover:text-slate-900 hover:bg-white dark:hover:bg-slate-800 dark:hover:text-white transition-all" title="Загрузить бэкап"><Icons.Upload /></button>
                  <input type="file" accept=".json" ref={fileInputRef} onChange={importFromFile} className="hidden" />
                </div>

                {/* Режим просмотра */}
                <div className="flex bg-slate-100/80 dark:bg-slate-900 p-1 rounded-xl border border-slate-200/80 dark:border-slate-700">
                  <button onClick={() => {setViewMode('grid'); safeStorageSet('dashViewMode', 'grid')}} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-all ${viewMode === 'grid' ? 'bg-white dark:bg-slate-800 shadow-sm text-blue-600 dark:text-blue-400' : 'text-slate-500 hover:text-slate-800 dark:hover:text-white'}`}>
                    <Icons.Layout /> <span className="hidden sm:inline">Секции</span>
                  </button>
                  <button onClick={() => {setViewMode('kanban'); safeStorageSet('dashViewMode', 'kanban')}} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-all ${viewMode === 'kanban' ? 'bg-white dark:bg-slate-800 shadow-sm text-blue-600 dark:text-blue-400' : 'text-slate-500 hover:text-slate-800 dark:hover:text-white'}`}>
                    <Icons.Columns /> <span className="hidden sm:inline">Канбан</span>
                  </button>
                </div>

                {/* Фильтр и Тема */}
                <button onClick={() => setHideCompleted(!hideCompleted)} className={`p-2.5 rounded-xl border transition-colors ${hideCompleted ? 'bg-blue-50 border-blue-200 text-blue-600' : 'bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 dark:hover:text-white'}`} title="Скрыть готовое">
                  <Icons.Filter />
                </button>
                <button onClick={toggleTheme} className="p-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-500 hover:text-slate-900 dark:hover:text-white rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                  {isDark ? <Icons.Sun /> : <Icons.Moon />}
                </button>
              </div>
            </header>

            {/* ПРОГРЕСС БАР */}
            <div className="mb-8 flex-shrink-0 w-full bg-white dark:bg-slate-850 p-5 sm:p-6 rounded-3xl border border-slate-200 dark:border-slate-700/80 shadow-sm">
              <div className="flex justify-between items-end mb-3">
                <span className="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Выполнено задач: <strong className="text-slate-800 dark:text-white text-lg ml-2">{progressStats.completed} из {progressStats.total}</strong></span>
                <span className="text-2xl font-black text-blue-600 dark:text-blue-400">{progressStats.percent}%</span>
              </div>
              <div className="w-full bg-slate-100 dark:bg-slate-900 rounded-full h-3 overflow-hidden shadow-inner">
                <div className="bg-gradient-to-r from-blue-500 to-indigo-500 h-full rounded-full transition-all duration-1000 ease-out" style={{ width: `${progressStats.percent}%` }}></div>
              </div>
            </div>

            {/* КОНТЕНТ (СЕТКА PINTEREST ИЛИ КАНБАН) */}
            {viewMode === 'grid' ? (
              // ИСПОЛЬЗУЕМ CSS COLUMNS ДЛЯ ПЛОТНОЙ СЕТКИ (MASONRY)
              <div className="columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-6">
                {sections.map(section => <SectionCard key={section.id} section={section} hideCompleted={hideCompleted} searchQuery={searchQuery} onToggle={toggleItem} onDelete={deleteItem} onAdd={addItem} onEdit={editItem} onColorCycle={cycleItemColor} onAssignCycle={cycleAssignee} onMove={moveItem} />)}
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6 flex-1">
                <KanbanColumn title="Нужно сделать" status="todo" items={kanbanData.todo} onStatusChange={changeStatus} onToggle={toggleItem} onAssignCycle={cycleAssignee} onColorCycle={cycleItemColor} />
                <KanbanColumn title="В процессе" status="in-progress" items={kanbanData.inProgress} onStatusChange={changeStatus} onToggle={toggleItem} onAssignCycle={cycleAssignee} onColorCycle={cycleItemColor} />
                <KanbanColumn title="Готово" status="done" items={kanbanData.done} onStatusChange={changeStatus} onToggle={toggleItem} onAssignCycle={cycleAssignee} onColorCycle={cycleItemColor} />
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
