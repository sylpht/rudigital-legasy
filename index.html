<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metallhaut® — Настоящий жидкий металл</title>
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ И ЦВЕТА */
        :root {
            --brass: #b5955c;        /* Цвет латуни/бронзы */
            --brass-light: #d4af37;  /* Светлый блик металла */
            --concrete-dark: #121212; /* Глубокий темный (основа) */
            --text-main: #f0f0f0;    /* Светлый текст */
        }
        
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--concrete-dark);
            color: var(--text-main);
        }

        /* ГЛАВНЫЙ ЭКРАН */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            /* Градиентный фон с имитацией темного бетона/чугуна */
            background: linear-gradient(135deg, #0a0a0a 0%, #2a2a2a 100%);
            padding: 0 20px;
        }

        /* Шум для имитации макро-текстуры материала */
        .hero::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.04"/%3E%3C/svg%3E');
            pointer-events: none;
        }

        /* ВЕРХНЕЕ МЕНЮ (ШАПКА) */
        .header-top {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            z-index: 10;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .contact-top a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 16px;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .contact-top a:hover {
            color: var(--brass-light);
        }

        /* КОНТЕНТ ПО ЦЕНТРУ */
        .hero-content {
            max-width: 900px;
            z-index: 1;
        }

        /* Эффект полированного металла для заголовка */
        .title {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 24px;
            line-height: 1.1;
            background: linear-gradient(to right, var(--brass), #fdfbf7, var(--brass-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 20px;
            font-weight: 300;
            line-height: 1.5;
            color: #b0b0b0;
            margin-bottom: 40px;
            max-width: 750px;
            margin-left: auto;
            margin-right: auto;
        }

        /* КНОПКА CTA */
        .cta-btn {
            display: inline-block;
            padding: 18px 45px;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--concrete-dark);
            background: linear-gradient(135deg, var(--brass-light), var(--brass));
            border: none;
            border-radius: 3px; /* Острые, брутальные углы */
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(181, 149, 92, 0.15);
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(181, 149, 92, 0.35);
        }

        /* Адаптив под мобильные устройства */
        @media (max-width: 768px) {
            .header-top { padding: 20px; flex-direction: column; gap: 15px; }
            .title { font-size: 42px; }
            .subtitle { font-size: 16px; }
            .cta-btn { padding: 15px 30px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <header class="header-top">
            <div class="logo">METALLHAUT<span style="font-size:14px; vertical-align:top;">®</span></div>
            <div class="contact-top">
                <a href="tel:+74955054525">+7 (495) 505-45-25</a>
            </div>
        </header>

        <div class="hero-content">
            <h1 class="title">Это материал, а не краска</h1>
            <p class="subtitle">Настоящий жидкий металл для мебели, интерьера и архитектуры — от производителя. Золото, серебро, медь, бронза и другие. Доставка по всей России.</p>
            <a href="https://wa.me/79265054525" class="cta-btn" target="_blank">Связаться</a>
        </div>
    </section>

</body>
</html>
